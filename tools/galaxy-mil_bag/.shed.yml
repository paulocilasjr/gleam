categories:
  - Machine Learning
description: Multiple Instance Learning (MIL) tool for creating and pooling bags from tabular data
name: galaxy_mil_bag
owner: goeckslab
long_description: |
  The MIL Bag tool enables Multiple Instance Learning within the Galaxy platform by constructing
  instance bags from tabular data—typically embedding vectors—and applying various pooling strategies
  to summarize information. It supports multiple pooling methods, including max, min, first-instance,
  attention-based, and others, allowing users to tailor aggregation to specific learning tasks.

  This tool is designed to bridge instance-level and bag-level learning in applications such as
  weak supervision, biomedical outcome prediction, and image patch aggregation. Its user-friendly
  interface makes it accessible for researchers without requiring custom code, while offering 
  flexibility for advanced experimentation. MIL Bag provides a foundation for scalable and interpretable
  learning in contexts where label granularity is limited.
