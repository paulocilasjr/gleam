suite:
  name: suite_mil_bag
  description: A Galaxy tool for Multiple Instance Learning with configurable pooling strategies.
  long_description: |
    The MIL Bag tool enables bag-level modeling from instance-level data using Multiple Instance Learning (MIL)
    techniques. Built for Galaxy, it allows users to generate bags from tabular inputs and apply a range of
    pooling functions—such as max, min, first-instance, and attention—to produce bag-level representations
    suitable for downstream supervised learning tasks.

    MIL Bag is particularly useful for domains like biomedical informatics, where individual samples (e.g.,
    image patches, molecular features) contribute collectively to patient-level labels. This tool lowers
    the barrier to deploying MIL workflows by abstracting core steps into a modular, GUI-driven interface.
